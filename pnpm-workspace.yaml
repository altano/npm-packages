packages:
  - examples/*
  - packages/*

# Specifies the number of minutes that must pass after a version is published
# before pnpm will install it. For example, setting minimumReleaseAge: 1440
# ensures that only packages released at least one day ago can be installed.
#
# https://github.com/pnpm/pnpm/releases/tag/v10.16.0
minimum-release-age-exclude: 4320

