name: test

# As recommended by Graphite
# (https://graphite.dev/docs/github-configuration-guidelines#github-actions)
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

# Cancel in-progress jobs for the same work
# (https://graphite.dev/docs/troubleshooting#why-are-my-actions-running-twice)
concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}-${{ github.ref == 'refs/heads/main' && github.sha || ''}}
  cancel-in-progress: true

# Use Turborepo remote caching w/ custom cache server
env:
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # Having this as an explicit and independent job, despite the fact that
  # turborepo knows building is a dependency of all the tasks below, is useful
  # because it primes the turborepo remote cache and we can cache the nix store
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Prepare
        uses: ./.github/actions/install-nix
        with:
          devshell: ci
      - name: Build
        run: nix develop .#ci --command pnpm turbo run build --summarize
      - name: Summarize Turbo
        uses: ./.github/actions/turbo-summarize

  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Prepare
        uses: ./.github/actions/install-nix
        with:
          devshell: ci
      - name: Lint
        run: nix develop .#ci --command pnpm turbo run lint --summarize
      - name: Summarize Turbo
        uses: ./.github/actions/turbo-summarize

  format:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Prepare
        uses: ./.github/actions/install-nix
        with:
          devshell: ci
      - name: Format
        run: nix develop .#ci --command pnpm turbo run format --summarize
      - name: Summarize Turbo
        uses: ./.github/actions/turbo-summarize

  check:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Prepare
        uses: ./.github/actions/install-nix
        with:
          devshell: ci
      - name: Check
        run: nix develop .#ci --command pnpm turbo run check --summarize
      - name: Summarize Turbo
        uses: ./.github/actions/turbo-summarize

  test-unit:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Prepare
        uses: ./.github/actions/install-nix
        with:
          devshell: test-unit
      - name: Run tests
        run: nix develop .#test-unit --command pnpm turbo run test:unit --summarize
      - name: Summarize Turbo
        uses: ./.github/actions/turbo-summarize

  test-e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Prepare
        uses: ./.github/actions/install-nix
        with:
          devshell: test-e2e
      - name: Debug Playwright browsers
        run: |
          nix develop .#test-e2e --command bash -c '
            echo "PLAYWRIGHT_BROWSERS_PATH=$PLAYWRIGHT_BROWSERS_PATH"
            ls -la "$PLAYWRIGHT_BROWSERS_PATH"/
            echo "--- webkit contents ---"
            ls -la "$PLAYWRIGHT_BROWSERS_PATH"/webkit-*/
            echo "--- testing webkit binary ---"
            ldd "$PLAYWRIGHT_BROWSERS_PATH"/webkit-*/minibrowser-wpe/MiniBrowser 2>&1 | grep "not found" || echo "all libs found"
          '
      - name: Run tests
        run: nix develop .#test-e2e --command pnpm turbo run test:e2e --summarize
        env:
          DEBUG: "pw:browser*"
      - name: Summarize Turbo
        uses: ./.github/actions/turbo-summarize
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: "**/playwright-report/"
          retention-days: 30

  # When this completes, all validation is successful. This job only exists so
  # that we have *one* job we can make required in the repository settings. The
  # alternative is to define all the required jobs (e.g. test-e2e, test-unit,
  # lint, etc) separately in the repository settings, and manually keep that
  # setting in sync with this file. Defining the list here in code is better.
  test:
    needs: [build, lint, format, check, test-unit, test-e2e]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Done."
