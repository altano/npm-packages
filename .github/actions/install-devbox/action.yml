name: "Install a Devbox environment"
description: "Install Devbox+Nix and setup the Devbox shell"
runs:
  using: "composite"
  steps:
    - name: Install Devbox
      uses: jetpack-io/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # ~v0.14.0
      with:
        project-path: ./devbox/configs/ci
        enable-cache: true
        devbox-version: 0.17.0
    - name: Install Dependencies
      shell: bash
      run: devbox run --config ./devbox/configs/ci pnpm install
